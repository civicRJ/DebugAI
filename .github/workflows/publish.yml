name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v0.2.0, v1.0.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted PyPI publishing (no token needed)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the distribution
        run: |
          pip install build
          rm -rf dist build debugerai.egg-info
          python -m build
          ls dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no API token needed.
        # One-time setup at https://pypi.org/manage/account/publishing/:
        #   Owner: civicRJ  Repo: DebugAI  Workflow: publish.yml  Env: (leave blank)
