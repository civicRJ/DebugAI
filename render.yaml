databases:
  - name: debugai-db
    databaseName: debugai
    user: debugai
    plan: free

services:
  - type: web
    name: debugai
    runtime: docker
    dockerfilePath: ./Dockerfile.cloud
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: debugai-db
          property: connectionString
      - key: DEBUGAI_TRUST_PROXY
        value: "1"
      - key: DEBUGAI_NLI_API
        value: "1"
      # HF model cache → /tmp so the embedder can write on the free tier
      # (no persistent disk on free; models re-download on each cold start)
      - key: HF_HOME
        value: /tmp/hf-models
      # Uncomment and set in Render dashboard for optional features:
      # HF_TOKEN       — higher HF Inference API rate limits (free account fine)
      # OPENAI_API_KEY — instruction-adherence judge
      # ANTHROPIC_API_KEY — Claude explainer
