services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: debugai
      POSTGRES_USER: debugai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-debugai_dev}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debugai"]
      interval: 5s
      timeout: 5s
      retries: 5

  debugai:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://debugai:${POSTGRES_PASSWORD:-debugai_dev}@postgres:5432/debugai
      DEBUGAI_TRUST_PROXY: "1"
    volumes:
      - debugai-data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - debugai

volumes:
  pg-data:
  debugai-data:
  caddy-data:
  caddy-config:
