<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DebugAI — Diagnosis Dashboard</title>
<meta name="description" content="Live LLM failure diagnoses — every request broken down by signal, scored by confidence, shipped with a fix." />

<!-- React UMD (pinned) must load before the DS bundle -->
<script src="/static/vendor/react.js"></script>
<script src="/static/vendor/react-dom.js"></script>

<!-- DebugAI design system -->
<link rel="stylesheet" href="/ds/styles.css" />
<link rel="stylesheet" href="/static/dashboard.css" />
<script src="/ds/_ds_bundle.js"></script>
<script>
/* Load client config then analytics — non-blocking */
fetch("/api/config").then(r=>r.json()).then(cfg=>{
  window.__DEBUGAI_CONFIG__ = cfg;
  if(cfg.posthogKey){
    const s=document.createElement("script");
    s.src="/static/analytics.js"; s.async=true;
    document.head.appendChild(s);
  }
}).catch(()=>{});
</script>
</head>
<body>
<div id="root">
  <div class="boot">Loading DebugAI dashboard…</div>
</div>
<script src="/static/dist/dashboard.js"></script>
</body>
</html>
