<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DebugAI — Admin</title>
<link rel="stylesheet" href="/ds/styles.css" />
<link rel="stylesheet" href="/static/dashboard.css" />
<style>
  .admin-shell { max-width: 960px; margin: 0 auto; padding: var(--space-8) var(--space-6); }
  .admin-head { display: flex; align-items: center; gap: var(--space-4); margin-bottom: var(--space-8); }
  .admin-title { font-size: var(--text-h3); font-weight: var(--weight-semibold); }
  .admin-badge { font-family: var(--font-mono); font-size: var(--text-2xs); background: var(--amber-muted); color: var(--amber-base); border: 1px solid var(--amber-700); border-radius: var(--radius-sm); padding: 2px 8px; }
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-8); }
  .admin-card { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); }
  .admin-card__val { font-family: var(--font-mono); font-size: var(--text-h2); font-weight: var(--weight-bold); line-height: 1; }
  .admin-card__label { font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-tertiary); margin-top: var(--space-2); }
  .admin-section { margin-bottom: var(--space-8); }
  .admin-section h2 { font-size: var(--text-body-lg); font-weight: var(--weight-semibold); margin: 0 0 var(--space-4); }
  .admin-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
  .admin-table th { text-align: left; font-family: var(--font-mono); font-size: var(--text-2xs); text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--text-tertiary); padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-subtle); }
  .admin-table td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-faint); color: var(--text-secondary); font-family: var(--font-mono); font-size: var(--text-xs); }
  .admin-table tr:hover td { background: var(--bg-overlay); }
  .admin-bar { display: flex; align-items: center; gap: var(--space-3); margin-bottom: 6px; }
  .admin-bar__label { font-size: var(--text-xs); color: var(--text-secondary); min-width: 140px; }
  .admin-bar__track { flex: 1; height: 8px; background: var(--bg-sunken); border-radius: var(--radius-full); overflow: hidden; }
  .admin-bar__fill { height: 100%; border-radius: var(--radius-full); background: var(--amber-base); }
  .admin-bar__count { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-tertiary); min-width: 32px; text-align: right; }
</style>
</head>
<body>
<div class="admin-shell">
  <div class="admin-head">
    <a href="/dashboard" style="color:var(--text-tertiary);text-decoration:none;font-size:var(--text-sm)">← Dashboard</a>
    <div class="admin-title">Admin</div>
    <span class="admin-badge">STAFF</span>
  </div>
  <div id="admin-root"><div class="empty">Loading…</div></div>
</div>
<script>
async function load() {
  const r = await fetch("/api/admin/stats");
  if (!r.ok) { document.getElementById("admin-root").innerHTML = '<div class="error-banner">Access denied or not logged in.</div>'; return; }
  const d = await r.json();
  const FAILURE_LABELS = { retrieval_failure:"Retrieval failure", hallucination:"Hallucination", context_overflow:"Context overflow", entity_gap:"Entity gap", prompt_brittleness:"Prompt brittleness", healthy:"Healthy" };
  const byF = d.diagnoses.by_failure || {};
  const maxF = Math.max(1, ...Object.values(byF));
  const bars = Object.entries(byF).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
    <div class="admin-bar">
      <span class="admin-bar__label">${FAILURE_LABELS[k]||k}</span>
      <div class="admin-bar__track"><div class="admin-bar__fill" style="width:${(v/maxF)*100}%"></div></div>
      <span class="admin-bar__count">${v}</span>
    </div>`).join("");
  const userRows = (d.recent_users||[]).map(u=>`<tr><td>${u.name}</td><td>${u.email}</td><td>${new Date(u.created_at*1000).toLocaleDateString()}</td></tr>`).join("");
  document.getElementById("admin-root").innerHTML = `
    <div class="admin-grid">
      <div class="admin-card"><div class="admin-card__val">${d.users}</div><div class="admin-card__label">Total users</div></div>
      <div class="admin-card"><div class="admin-card__val">${d.diagnoses.total}</div><div class="admin-card__label">Diagnoses</div></div>
      <div class="admin-card"><div class="admin-card__val">${d.diagnoses.failing}</div><div class="admin-card__label">Failing</div></div>
      <div class="admin-card"><div class="admin-card__val">${d.traces.traces||0}</div><div class="admin-card__label">Traces</div></div>
      <div class="admin-card"><div class="admin-card__val">$${(d.traces.cost_usd||0).toFixed(4)}</div><div class="admin-card__label">Est. cost</div></div>
    </div>
    <div class="admin-section"><h2>Failure breakdown</h2>${bars}</div>
    <div class="admin-section"><h2>Recent signups</h2>
      <table class="admin-table"><thead><tr><th>Name</th><th>Email</th><th>Joined</th></tr></thead><tbody>${userRows}</tbody></table>
    </div>`;
}
load();
</script>
</body>
</html>
