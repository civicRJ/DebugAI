<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DebugAI — Join organisation</title>
<link rel="stylesheet" href="/ds/styles.css" />
<link rel="stylesheet" href="/static/dashboard.css" />
<link rel="stylesheet" href="/static/auth.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" id="invite-root" style="text-align:center">
    <div class="auth-brand" style="justify-content:center">
      <span class="auth-logo">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4" /></svg>
      </span>
      <span>Debug<b>AI</b></span>
    </div>
    <p style="color:var(--text-tertiary);font-family:var(--font-mono);font-size:var(--text-xs)">Loading…</p>
  </div>
</div>
<script>
(async function() {
  const root = document.getElementById("invite-root");
  const token = new URLSearchParams(location.search).get("token");
  if (!token) { root.innerHTML = '<div class="error-banner">Invalid invite link.</div>'; return; }

  // Check if user is logged in
  const me = await fetch("/api/auth/me").then(r => r.ok ? r.json() : null);

  // Get invite info
  const info = await fetch(`/api/orgs/invites/${token}`).then(r => r.ok ? r.json() : null);
  if (!info) {
    root.innerHTML = `
      <div class="auth-brand" style="justify-content:center;margin-bottom:var(--space-4)">
        <span class="auth-logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M3 12h4l3 8 4-16 3 8h4" /></svg></span>
        <span>Debug<b style="color:var(--amber-base)">AI</b></span>
      </div>
      <div class="error-banner">This invite has expired or is invalid.</div>
      <p style="margin-top:var(--space-4)"><a href="/" style="color:var(--amber-base)">← Back to DebugAI</a></p>`;
    return;
  }

  if (!me) {
    // Not logged in — redirect to register with the token preserved
    sessionStorage.setItem("pending_invite", token);
    location.href = `/register?invite=${token}`;
    return;
  }

  root.innerHTML = `
    <div class="auth-brand" style="justify-content:center;margin-bottom:var(--space-5)">
      <span class="auth-logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M3 12h4l3 8 4-16 3 8h4" /></svg></span>
      <span>Debug<b style="color:var(--amber-base)">AI</b></span>
    </div>
    <h1 class="auth-title">Join ${info.org_name}</h1>
    <p class="auth-sub">You've been invited to join <b>${info.org_name}</b> as a ${info.role}.</p>
    <button id="accept-btn" class="auth-submit" style="width:100%;margin-top:var(--space-4)">
      Join ${info.org_name}
    </button>
    <p style="margin-top:var(--space-3)">
      <a href="/dashboard" style="font-size:var(--text-sm);color:var(--text-tertiary)">Not now</a>
    </p>`;

  document.getElementById("accept-btn").onclick = async function() {
    this.disabled = true; this.textContent = "Joining…";
    const r = await fetch(`/api/orgs/invites/${token}/accept`, { method: "POST" });
    if (r.ok) {
      const d = await r.json();
      // Switch to the new org workspace
      await fetch("/api/user/workspace", { method: "PATCH",
        headers: {"Content-Type":"application/json"}, body: JSON.stringify({org_id: d.org_id}) });
      location.href = "/dashboard";
    } else {
      const e = await r.json();
      root.innerHTML += `<div class="error-banner" style="margin-top:var(--space-3)">${e.detail || "Failed to join."}</div>`;
    }
  };
})();
</script>
</body>
</html>
