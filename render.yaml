databases:
  - name: debugai-db
    databaseName: debugai
    user: debugai
    plan: free

services:
  - type: web
    name: debugai
    runtime: docker
    dockerfilePath: ./Dockerfile.cloud
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: debugai-db
          property: connectionString
      - key: DEBUGAI_TRUST_PROXY
        value: "1"
      - key: DEBUGAI_NLI_API
        value: "1"
      # Set HF_TOKEN to your HuggingFace token for higher free-tier rate limits:
      # https://huggingface.co/settings/tokens  (read-only token is fine)
      # - key: HF_TOKEN
      #   sync: false
      # Add your keys in the Render dashboard under Environment:
      # OPENAI_API_KEY, ANTHROPIC_API_KEY, DEBUGAI_JUDGE_MODEL
    disk:
      name: debugai-data
      mountPath: /data
      sizeGB: 1
